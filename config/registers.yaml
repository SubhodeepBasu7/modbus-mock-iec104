  - address: 11073
    name: ControlStage_30_percent_Feedback_ON_OFF
    datatype: uint16
    byteorder: bigE
    factor: 1
    unit: An/Aus
    access: read
    role: feedback
    category: feedback
    description: "30% curtailment feedback active."

  - address: 11074
