  - address: 11062
    name: ControlStage_SetPoint_percent
    datatype: BIT
    byteorder: bigE
    factor: 1
    unit: "%"
    access: write
    role: grid_operator_command
    category: control_stage
    description: "Bitfield control stage. b0=0%, b1=30%, b2=60%, b3=100%."

  - address: 11063
    name: ControlStage_Feedback_percent
    datatype: BIT
    byteorder: bigE
    factor: 1
    unit: "%"
    access: read
    role: feedback
    category: feedback
    description: "Bitfield feedback control stage. b0=0%, b1=30%, b2=60%, b3=100%."

  # ── Individual control stage ON/OFF ───────────────────────────────────────
  - address: 11070
    name: ControlStage_0_percent_SetPoint_ON_OFF
    datatype: uint16
    byteorder: bigE
    factor: 1
    unit: An/Aus
    access: write
    role: grid_operator_command
    category: control_stage
    description: "0% curtailment command active."

  - address: 11071
    name: ControlStage_0_percent_Feedback_ON_OFF
    datatype: uint16
    byteorder: bigE
    factor: 1
    unit: An/Aus
    access: read
    role: feedback
    category: feedback
