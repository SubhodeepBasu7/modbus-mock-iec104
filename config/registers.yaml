  - address: 11076
    name: ControlStage_100_percent_SetPoint_ON_OFF
    datatype: uint16
    byteorder: bigE
    factor: 1
    unit: An/Aus
    access: write
    role: grid_operator_command
    category: control_stage
    description: "100% control stage command active."

  - address: 11077
